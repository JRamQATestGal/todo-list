name: Playwright Tests
on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  smoke:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: lts/*
      - name: Cache node modules
        uses: actions/cache@v4
        with:
          path: |
            ~/.npm
            node_modules
          key: ${{ runner.os }}-node-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-
      - name: Install dependencies
        run: npm ci
      - name: Install Playwright Browsers
        run: npx playwright install --with-deps
      - name: Run Playwright smoke tests
        run: npx playwright test --grep "@smoke" --reporter=html
      - name: Upload smoke report (contents)
        uses: actions/upload-artifact@v6
        if: ${{ always() }}
        with:
          name: playwright-report-smoke
          path: playwright-report/**
          retention-days: 30

  regression:
    needs: smoke
    if: ${{ needs.smoke.result == 'success' }}
    timeout-minutes: 60
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: lts/*
      - name: Cache node modules
        uses: actions/cache@v4
        with:
          path: |
            ~/.npm
            node_modules
          key: ${{ runner.os }}-node-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-
      - name: Install dependencies
        run: npm ci
      - name: Install Playwright Browsers
        run: npx playwright install --with-deps
      - name: Download smoke report
        uses: actions/download-artifact@v4
        with:
          name: playwright-report-smoke
          path: smoke-report
      - name: Verify smoke report exists
        run: |
          echo "Checking for smoke report contents in smoke-report"
          if [ -n "$(ls -A smoke-report 2>/dev/null)" ]; then
            echo "Smoke report contents found"
            ls -la smoke-report || true
          else
            echo "Smoke report artifact missing or empty. Failing regression job to avoid misleading combined report."
            ls -la smoke-report || true
            exit 1
          fi
      - name: Run Playwright regression tests
        run: npx playwright test --grep "@regression" --reporter=html
      - name: Combine smoke and regression reports into playwright-report
        run: |
          set -e
          # Create a merged directory and copy smoke + regression outputs into it
          rm -rf merged-playwright-report || true
          mkdir -p merged-playwright-report
          # Copy smoke report contents (artifact downloaded into smoke-report/*)
          if [ -n "$(ls -A smoke-report 2>/dev/null)" ]; then cp -r smoke-report/* merged-playwright-report/ || true; fi
          if [ -d "playwright-report" ]; then cp -r playwright-report/* merged-playwright-report/ || true; fi
          # Replace the job's playwright-report with the merged output
          rm -rf playwright-report || true
          mv merged-playwright-report playwright-report

      - name: Upload combined reports
        uses: actions/upload-artifact@v6
        if: ${{ always() }}
        with:
          name: playwright-reports
          path: playwright-report/
          retention-days: 30
